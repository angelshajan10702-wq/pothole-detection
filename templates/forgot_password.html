<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | INFRAMATRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

<div class="login-page">
    <div class="login-overlay"></div>

    <div class="login-wrapper">
        <a href="{{ url_for('home') }}" class="brand-block">
            <img src="{{ url_for('static', filename='logo_symbol.png') }}" alt="InfraMatrix Logo" class="brand-logo">
            <div class="brand-text">
                <span class="brand-name">
                    <span class="infra">INFRA</span><span class="matrix">MATRIX</span>
                </span>
                <span class="brand-sub">AI ROAD MONITORING</span>
            </div>
        </a>

        <div class="login-card">
            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your email to reset your password</p>

            <form id="forgotForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <button type="submit" class="login-btn">Send Reset Link</button>

                <p class="back-home">
                    <a href="{{ url_for('login_page') }}">← Back to Sign In</a>
                </p>
            </form>
        </div>
    </div>
</div>

<script>
function applyTheme(theme) {
    if (theme === "Light Mode") {
        document.documentElement.setAttribute("data-theme", "light");
    } else {
        document.documentElement.setAttribute("data-theme", "dark");
    }
}

document.addEventListener("DOMContentLoaded", function() {
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
        applyTheme(savedTheme);
    } else {
        applyTheme("Dark Mode");
    }
});

document.getElementById("forgotForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;

    fetch("/forgot-password", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:email})
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = data.redirect;
        } else {
            alert(data.message || "Email not found");
        }
    })
    .catch(err => {
        console.error("Error:", err);
        alert("Something went wrong");
    });
});
</script>

</body>
</html>
