<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | INFRAMATRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

<div class="login-page">
    <div class="login-overlay"></div>

    <div class="login-wrapper">
        <a href="{{ url_for('home') }}" class="brand-block">
            <img src="{{ url_for('static', filename='logo_symbol.png') }}" alt="InfraMatrix Logo" class="brand-logo">
            <div class="brand-text">
                <span class="brand-name">
                    <span class="infra">INFRA</span><span class="matrix">MATRIX</span>
                </span>
                <span class="brand-sub">AI ROAD MONITORING</span>
            </div>
        </a>

        <div class="login-card">
            <h2>Reset Password</h2>
            <p class="subtitle">Create a new password for your account</p>

            <form id="resetForm">
                <div class="input-group">
                    <input type="email" id="email" value="{{ email }}" readonly>
                </div>

                <div class="input-group">
                    <input type="password" id="newPassword" placeholder="New Password" required>
                </div>

                <div class="input-group">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>

                <button type="submit" class="login-btn">Update Password</button>

                <p class="back-home">
                    <a href="{{ url_for('login_page') }}">← Back to Sign In</a>
                </p>
            </form>
        </div>
    </div>
</div>

<script>
function applyTheme(theme) {
    if (theme === "Light Mode") {
        document.documentElement.setAttribute("data-theme", "light");
    } else {
        document.documentElement.setAttribute("data-theme", "dark");
    }
}

document.addEventListener("DOMContentLoaded", function () {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
        applyTheme(savedTheme);
    } else {
        applyTheme("Dark Mode");
    }
});

document.getElementById("resetForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    fetch("/reset-password", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email: email,
            password: newPassword
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("Password updated successfully");
            window.location.href = "/login";
        } else {
            alert(data.message || "Failed to update password");
        }
    })
    .catch(err => {
        console.error("Error:", err);
        alert("Something went wrong");
    });
});
</script>

</body>
</html>
